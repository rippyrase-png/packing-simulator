<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Packing Planner ✈️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: Inter, Arial;
  background: linear-gradient(135deg, #fef6f9, #eef6ff);
  color: #333;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: 600;
}

.sub {
  font-size: 12px;
  opacity: 0.7;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 12px;
  justify-content: center;
}

/* CARD STYLE */
.card {
  background: white;
  border-radius: 16px;
  padding: 12px;
  width: 45%;
  min-width: 160px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* ITEM CHIPS */
.item {
  background: #f3f4f6;
  padding: 8px;
  margin: 6px 0;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
  background: #e9eefc;
}

.selected {
  outline: 2px solid #7aa7ff;
  background: #e6f0ff;
}

/* SLOT AREA */
.slot {
  min-height: 90px;
  border: 2px dashed #d0d0d0;
  border-radius: 14px;
  padding: 8px;
  background: #fafafa;
}

/* METERS */
meter {
  width: 100%;
  height: 10px;
}

h2 {
  font-size: 14px;
  margin-bottom: 6px;
}
</style>
</head>

<body>

<header>
✈️ Packing Planner
<div class="sub">Tap items → tap bag → build your trip aesthetic</div>
</header>

<div class="container">

<!-- ITEMS -->
<div class="card">
<h2>👕 Closet</h2>

<div class="item" data-size="2">T-Shirt</div>
<div class="item" data-size="3">Pants</div>
<div class="item" data-size="2">Shorts</div>
<div class="item" data-size="1">Socks</div>
<div class="item" data-size="1">Underwear</div>
<div class="item" data-size="3">Light Jacket</div>

</div>

<!-- SUITCASE -->
<div class="card">
<h2>🧳 Suitcase</h2>
<meter id="suitcaseMeter" max="20" value="0"></meter>
<div class="slot" id="suitcase"></div>
</div>

<!-- CARRY ON -->
<div class="card">
<h2>🎒 Carry-On</h2>
<meter id="carryMeter" max="12" value="0"></meter>
<div class="slot" id="carry"></div>
</div>

<!-- TOILETRIES -->
<div class="card">
<h2>🧴 Toiletry Bag</h2>
<meter id="toiletMeter" max="8" value="0"></meter>
<div class="slot" id="toiletries"></div>
</div>

</div>

<script>

let selected = null;

// select item
document.querySelectorAll(".item").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".item").forEach(i => i.classList.remove("selected"));
    selected = el;
    el.classList.add("selected");
  });
});

// place item
document.querySelectorAll(".slot").forEach(slot => {
  slot.addEventListener("click", () => {

    if (!selected) return;

    const clone = document.createElement("div");
    clone.className = "item";

    let mode = "Folded";
    clone.innerText = selected.innerText + " (" + mode + ")";
    clone.dataset.size = selected.dataset.size;

    clone.addEventListener("click", (e) => {
      e.stopPropagation();
      mode = (mode === "Folded") ? "Rolled" : "Folded";
      clone.innerText = selected.innerText + " (" + mode + ")";
    });
