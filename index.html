<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Packing App ✈️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: Inter, Arial;
  overflow-x: hidden;
  background: linear-gradient(#dff3ff, #fff0f6);
}

/* ☁️ clouds */
.clouds {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
}

.cloud {
  position: absolute;
  background: white;
  border-radius: 100px;
  opacity: 0.6;
  animation: float 20s linear infinite;
}

.cloud:before,
.cloud:after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}

@keyframes float {
  from { transform: translateX(-200px); }
  to { transform: translateX(120vw); }
}

/* layout */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  height: 100vh;
}

/* sidebar */
.panel {
  width: 30%;
  padding: 10px;
  overflow-y: auto;
}

/* suitcase */
.suitcase {
  width: 70%;
  padding: 15px;
}

/* cards */
.card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(6px);
  border-radius: 16px;
  padding: 10px;
  margin-bottom: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h3 {
  margin: 5px 0;
  font-size: 14px;
}

/* CLOTHING BLOCKS */
.item {
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
  cursor: pointer;
  font-size: 13px;
  color: #222;
  transition: 0.2s;
}

/* colored “fabric” styles */
.shirt { background: #ffd6e7; }
.pants { background: #d6e7ff; }
.shorts { background: #fff3b0; }
.hoodie { background: #d9f2ff; }
.toiletry { background: #e6d6ff; }

/* suitcase area */
.box {
  background: #ffd6e7;
  border-radius: 18px;
  height: 90%;
  padding: 10px;
  position: relative;
}

/* space meter */
.bar {
  height: 12px;
  background: #eee;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff9ccf, #7ad1ff);
  transition: width 0.3s;
}

/* packed items */
.packed {
  padding: 8px;
  margin: 6px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.7); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* fold vs roll */
.folded {
  width: 90%;
}

.rolled {
  width: 50%;
  border-radius: 999px;
}

/* buttons */
button {
  border: none;
  padding: 6px 10px;
  border-radius: 10px;
  margin: 5px 0;
  cursor: pointer;
  background: white;
  box-shadow: 0 5px 12px rgba(0,0,0,0.08);
  font-size: 12px;
}

</style>
</head>

<body>

<div class="clouds" id="clouds"></div>

<div class="app">

<!-- LEFT PANEL -->
<div class="panel">

<div class="card">
<h3>👕 Clothes</h3>

<div class="item shirt" data-type="shirt">T-Shirt</div>
<div class="item pants" data-type="pants">Pants</div>
<div class="item shorts" data-type="shorts">Shorts</div>
<div class="item hoodie" data-type="hoodie">Hoodie</div>

</div>

<div class="card">
<h3>🎒 Carry-On</h3>

<div class="item toiletry">Headphones</div>
<div class="item toiletry">Charger</div>
<div class="item toiletry">Book</div>

</div>

<div class="card">
<h3>🧴 Toiletries</h3>

<div class="item toiletry">Toothbrush</div>
<div class="item toiletry">Face Wash</div>
<div class="item toiletry">Lotion</div>

</div>

</div>

<!-- SUITCASE -->
<div class="suitcase">

<h3>🧳 Suitcase</h3>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="box" id="box"></div>

</div>

</div>

<script>

let mode = "fold";

document.querySelectorAll(".item").forEach(el => {
  el.addEventListener("click", () => {

    const clone = document.createElement("div");
    clone.className = "packed " + (el.classList[1] || "");

    clone.innerText = el.innerText;

    clone.dataset.size = mode;

    if (mode === "roll") {
      clone.classList.add("rolled");
    } else {
      clone.classList.add("folded");
    }

    // ❌ remove on click
    clone.onclick = () => {
      clone.remove();
      update();
    };

    document.getElementById("box").appendChild(clone);
    update();
  });
});

function update() {
  const items = document.querySelectorAll(".packed").length;
  const percent = Math.min(100, items * 10);
  document.getElementById("fill").style.width = percent + "%";
}

/* clouds */
function makeClouds() {
  const c = document.getElementById("clouds");

  for (let i = 0; i < 6; i++) {
    let d = document.createElement("div");
    d.className = "cloud";
    d.style.top = Math.random() * 100 + "vh";
    d.style.left = Math.random() * 100 + "vw";
    d.style.width = (80 + Math.random() * 80) + "px";
    d.style.height = (40 + Math.random() * 40) + "px";
    d.style.animationDuration = (20 + Math.random() * 20) + "s";
    c.appendChild(d);
  }
}

makeClouds();

</script>

</body>
</html>
