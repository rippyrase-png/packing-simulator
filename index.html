<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Packing Fix</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:10px; }
.box { background:white; padding:10px; margin:10px 0; border-radius:10px; }
.item { padding:8px; margin:5px 0; background:#dbeafe; border-radius:8px; cursor:pointer; }
.selected { outline:3px solid orange; }
.slot { min-height:80px; border:2px dashed #aaa; padding:8px; border-radius:10px; }
</style>
</head>

<body>

<h3>🧳 Packing Test (tap works version)</h3>

<div class="box">
<h4>Items</h4>
<div class="item">T-Shirt</div>
<div class="item">Pants</div>
<div class="item">Shorts</div>
</div>

<div class="box">
<h4>Suitcase</h4>
<div class="slot"></div>
</div>

<script>
let selected = null;

document.querySelectorAll(".item").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".item").forEach(i => i.classList.remove("selected"));
    selected = el;
    el.classList.add("selected");
  });
});

document.querySelector(".slot").addEventListener("click", () => {
  if (!selected) return;

  const clone = document.createElement("div");
  clone.className = "item";
  clone.innerText = selected.innerText;

  document.querySelector(".slot").appendChild(clone);
});
</script>

</body>
</html>
